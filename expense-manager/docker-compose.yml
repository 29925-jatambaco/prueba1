version: '3.8'

services:
  expense-manager:
    build: .
    container_name: expense-manager
    restart: unless-stopped
    ports:
      - "6666:6666"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=6666
      - DATABASE_PATH=/app/data/expenses.db
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6666/api/summary"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - expense-network

networks:
  expense-network:
    driver: bridge
