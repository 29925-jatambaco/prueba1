<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Gastos Personales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #3498db;
      --secondary-color: #2c3e50;
      --accent-color: #e74c3c;
      --success-color: #2ecc71;
      --warning-color: #f39c12;
      --background-color: #f5f6fa;
      --text-color: #2c3e50;
      --border-radius: 12px;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--background-color);
      color: var(--text-color);
      line-height: 1.6;
      min-height: 100vh;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: linear-gradient(135deg, var(--primary-color), #2980b9);
      color: white;
      padding: 30px 20px;
      border-radius: var(--border-radius);
      margin-bottom: 24px;
      box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    header p {
      opacity: 0.9;
      font-size: 1rem;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 992px) {
      .main-grid {
        grid-template-columns: 400px 1fr;
      }
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Notification Toast */
    .notification-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .notification {
      padding: 16px 24px;
      border-radius: var(--border-radius);
      color: white;
      font-weight: 500;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      animation: slideIn 0.3s ease-out;
      max-width: 350px;
    }

    .notification.success {
      background: var(--success-color);
    }

    .notification.error {
      background: var(--accent-color);
    }

    .notification.info {
      background: var(--primary-color);
    }

    .notification.warning {
      background: var(--warning-color);
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    /* Loading Spinner */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      header {
        padding: 20px 16px;
      }

      header h1 {
        font-size: 1.5rem;
      }

      .app-container {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>💰 Gestor de Gastos Personales</h1>
      <p>Controla tus finanzas de manera simple y efectiva</p>
    </header>

    <div class="main-grid">
      <aside class="sidebar">
        <expense-form id="expenseForm"></expense-form>
      </aside>

      <main class="content">
        <expense-summary id="expenseSummary"></expense-summary>
        <category-filter id="categoryFilter"></category-filter>
        <expense-list id="expenseList"></expense-list>
      </main>
    </div>
  </div>

  <div class="notification-container" id="notificationContainer"></div>

  <!-- Load Web Components -->
  <script src="/client/components/expense-form.js" defer></script>
  <script src="/client/components/expense-list.js" defer></script>
  <script src="/client/components/expense-summary.js" defer></script>
  <script src="/client/components/category-filter.js" defer></script>

  <script>
    // Main App Controller
    class App {
      constructor() {
        this.init();
      }

      init() {
        document.addEventListener('DOMContentLoaded', () => {
          this.setupEventListeners();
        });
      }

      setupEventListeners() {
        const expenseForm = document.getElementById('expenseForm');
        const expenseList = document.getElementById('expenseList');
        const expenseSummary = document.getElementById('expenseSummary');
        const categoryFilter = document.getElementById('categoryFilter');

        // Handle expense saved
        expenseForm.addEventListener('expense-saved', (e) => {
          expenseList.refresh();
          expenseSummary.refresh();
        });

        // Handle edit expense
        expenseList.addEventListener('edit-expense', (e) => {
          expenseForm.editExpense(e.detail);
          // Scroll to form on mobile
          if (window.innerWidth < 992) {
            expenseForm.scrollIntoView({ behavior: 'smooth' });
          }
        });

        // Handle expenses changed
        expenseList.addEventListener('expenses-changed', () => {
          expenseSummary.refresh();
        });

        expenseSummary.addEventListener('expenses-changed', () => {
          expenseList.refresh();
          expenseSummary.refresh();
        });

        // Handle category filter
        categoryFilter.addEventListener('category-filter', (e) => {
          if (e.detail.categoryId) {
            expenseList.setAttribute('filter-category', e.detail.categoryId);
          } else {
            expenseList.removeAttribute('filter-category');
          }
        });

        // Handle notifications
        document.addEventListener('notification', (e) => {
          this.showNotification(e.detail.message, e.detail.type);
        });

        expenseForm.addEventListener('notification', (e) => {
          this.showNotification(e.detail.message, e.detail.type);
        });

        // Handle edit cancelled
        expenseForm.addEventListener('edit-cancelled', () => {
          expenseList.refresh();
        });
      }

      showNotification(message, type = 'info') {
        const container = document.getElementById('notificationContainer');
        
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        
        container.appendChild(notification);
        
        // Remove after 4 seconds
        setTimeout(() => {
          notification.style.animation = 'fadeOut 0.3s ease-out';
          setTimeout(() => {
            notification.remove();
          }, 300);
        }, 4000);
      }
    }

    // Initialize app
    new App();
  </script>
</body>
</html>
