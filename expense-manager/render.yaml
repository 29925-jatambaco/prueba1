services:
  - type: web
    name: expense-manager
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    region: oregon
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 6666
      - key: DATABASE_PATH
        value: ./data/expenses.db
